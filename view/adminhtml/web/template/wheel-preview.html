<div class="wheel-preview">
    <svg width="300" height="300" viewBox="0 0 200 200" data-bind="style: { transform: 'rotate(0deg)' }">
        <!-- ko foreach: { data: $parent.sectors, as: 'sector' } -->
        <path data-bind="
            attr: { 
                d: $parent.getSectorPath($index(), $parent.sectors().length),
                fill: sector.background_color,
                stroke: sector.border_color,
                'stroke-width': '2'
            }
        "></path>
        <text data-bind="
            attr: { 
                x: $parent.getTextX($index(), $parent.sectors().length),
                y: $parent.getTextY($index(), $parent.sectors().length)
            },
            style: { fill: sector.text_color },
            text: sector.label
        "></text>
        <!-- /ko -->
    </svg>
</div>
