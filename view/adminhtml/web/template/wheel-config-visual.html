<div class="wheel-config-visual">
    <div class="sectors-list">
        <h3>Sectors</h3>
        <table class="admin__table-secondary">
            <thead>
                <tr>
                    <th>Label</th>
                    <th>Probability</th>
                    <th>Cart Rule Price ID</th>
                    <th>Result Text</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody data-bind="foreach: { data: sectors, as: 'sector' }">
                <tr>
                    <td data-bind="text: sector.label"></td>
                    <td data-bind="text: sector.probability"></td>
                    <td data-bind="text: sector.rule_id"></td>
                    <td data-bind="text: sector.result_text"></td>
                    <td>
                        <button class="action-secondary" data-bind="click: $parent.editSector.bind($parent, sector)">
                            Edit
                        </button>
                        <button class="action-delete" data-bind="click: $parent.removeSector.bind($parent, sector)">
                            Delete
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="action-primary" data-bind="click: openAddSectorPopup">
            Add Sector
        </button>
    </div>

    <div class="modal" data-bind="visible: isPopupVisible, with: popupSector">
        <div class="modal-inner">
            <h2 data-bind="text: $parent.isEditing() ? 'Edit Sector' : 'Add Sector'"></h2>
            <form data-bind="submit: $parent.savePopupSector.bind($parent, $data)">
                <div class="field">
                    <label>Label</label>
                    <input type="text" data-bind="value: label, valueUpdate: 'input'" required />
                </div>
                <div class="field">
                    <label>Result Text</label>
                    <p>(The text that will be displayed in the win_coupon/lose window)</p>
                    <input type="text" data-bind="value: result_text, valueUpdate: 'input'" />
                </div>
                <div class="field">
                    <label>Probability (%)</label>
                    <input type="number" min="0" max="100" data-bind="value: probability, valueUpdate: 'input'" required />
                </div>
                <div class="field">
                    <label>Cart Price Rule</label>
                    <select
                      data-bind="
                        options: $parent.cartPriceRuleOptions,
                        optionsText: 'label',
                        optionsValue: 'value',
                        value: rule_id,
                        optionsCaption: '— Select rule —'
                      ">
                    </select>
                </div>
                <div class="field">
                    <label>Text Color</label>
                    <input type="color" data-bind="value: text_color, valueUpdate: 'input'" />
                </div>
                <div class="field">
                    <label>Background Color</label>
                    <input type="color" data-bind="value: background_color, valueUpdate: 'input'" />
                </div>
                <div class="field">
                    <label>Border Color</label>
                    <input type="color" data-bind="value: border_color, valueUpdate: 'input'" />
                </div>
                <div class="actions">
                    <button type="submit" class="action-primary">
                        Save
                    </button>
                    <button type="button" class="action-secondary" data-bind="click: $parent.closePopup">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .wheel-config-visual .sectors-list {
        margin-bottom: 20px;
    }

    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
    }

    .modal-inner {
        background: #fff;
        padding: 24px;
        margin: 50px auto;
        width: 400px;
        max-width: 90%;
        border-radius: 5px;
    }

    .field {
        margin-bottom: 15px;
    }

    .field label {
        display: block;
        margin-bottom: 5px;
    }

    .actions {
        margin-top: 20px;
        text-align: right;
    }

    .actions button {
        margin-left: 10px;
    }
</style>
